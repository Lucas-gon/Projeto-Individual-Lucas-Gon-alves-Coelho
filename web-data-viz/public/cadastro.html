<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Game Winner | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

  <!--header inicio-->
  <div class="header">
    <div class="container">
      <h1 class="titulo">Game Winner</h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <span href="#">Cadastro</span>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="container">
      <div class="card card-login-cadastro">
        <h2>Crie sua conta</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="seuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="mensagem_erro2"></div>
      </div>
    </div>
  </div>
</body>

</html>

<script>

  function cadastrar() {

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    if (nomeVar.trim() == "" || emailVar.trim() == "" || senhaVar.trim() == "" || confirmacaoSenhaVar.trim() == "") {
        mensagem_erro2.innerHTML = "⚠️ Por favor, preencha todos os campos!";
        return false;
    }

    let arroba = emailVar.indexOf('@'); 
    let ponto_com = emailVar.lastIndexOf('.com');

    if (arroba == -1 || ponto_com == -1 || ponto_com < arroba) {
        mensagem_erro2.innerHTML = "⚠️ E-mail inválido! Certifique-se de usar '@' e '.com' na ordem correta.";
        return false;
    }

    if (senhaVar.length < 8) {
    mensagem_erro2.innerHTML = "⚠️ A senha deve ter no mínimo 8 caracteres!";
    return false;
}

let tem_maiuscula = false;
let tem_numero = false;
let tem_especial = false;

let caracteresEspeciais = "!@#$%^&*()_+-=[]{}|;':\",./<>?";

for (let i = 0; i < senhaVar.length; i++) {
    let letra_atual = senhaVar[i];

    if (letra_atual >= '0' && letra_atual <= '9') {
        tem_numero = true;
    } 
    else if (letra_atual >= 'A' && letra_atual <= 'Z') {
        tem_maiuscula = true;
    } 
    else if (caracteresEspeciais.indexOf(letra_atual) != -1) {
        tem_especial = true;
    }
}

if (tem_maiuscula == false) {
    mensagem_erro2.innerHTML = "⚠️ A senha deve conter pelo menos uma letra maiúscula!";
    return false;
}

if (tem_numero == false) {
    mensagem_erro2.innerHTML = "⚠️ A senha deve conter pelo menos um número!";
    return false;
}

if (tem_especial == false) {
    mensagem_erro2.innerHTML = "⚠️ A senha deve conter pelo menos um caractere especial! (Ex: @, #, $)";
    return false;
  } 
  if(senhaVar !== confirmacaoSenhaVar) {
    mensagem_erro2.innerHTML = "⚠️ As senhas não coincidem!";
    return false;

  } else {

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
    .then(function (resposta) {
      console.log("resposta: ", resposta);

      if (resposta.ok) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML =
        "✅Cadastro realizado com sucesso!<br>Redirecionando para tela de Login...";
        
        setTimeout(() => {
          window.location = "login.html";
        }, "2000");
        
      } else {
        throw "Houve um erro ao tentar realizar o cadastro!";
      }
    })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
      
      return false;
    }
  }
  </script>
