<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Tentativa | Game Winner</title>
    <link rel="stylesheet" href="../css/style_tentativas.css">
        <link rel="icon" href="../assets/icon/game_winner.png">
            <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">

</head>
<body>
    <div class="container">
        <div class="card-questionario">
            <div class="card-header">
                <h2>Registrar Momento Clutch</h2>
                <p>Monitore seu desempenho sob pressão e alcance a evolução constante.</p>
            </div>

            <div class="campo">
                <label for="ipt_descricao">O que aconteceu na jogada?</label>
                <textarea id="ipt_descricao" placeholder="Ex: Tentei um arremesso decisivo nos segundos finais do último quarto..."></textarea>
            </div>

            <div class="campo">
                <label>Qual foi o desfecho?</label>
                <div class="botoes-resultado">
                    <button type="button" class="btn-acerto" onclick="selecionar('Acertou')">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><path d="M22 4L12 14.01l-3-3"></path></svg>
                        ACERTEI
                    </button>
                    <button type="button" class="btn-erro" onclick="selecionar('Errou')">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                        ERREI
                    </button>
                </div>
            </div>

            <div id="mensagem_erro" class=""></div>

            <button onclick="registrarTentativa()" class="btn-enviar">
                Registrar Tentativa
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>
</body>
</html>
<script>
    let resultado_escolhido = "";
    
    function selecionar(valor) {
    resultado_escolhido = valor;

    const btn_acerto = document.querySelector(".btn-acerto");
    const btn_erro = document.querySelector(".btn-erro");

    if (valor === "Acertou") {

        btn_acerto.classList.add("active");
        btn_erro.classList.remove("active");

    } else if (valor === "Errou") {

        btn_erro.classList.add("active");
        btn_acerto.classList.remove("active");
        }
    }
    
    function registrarTentativa() {
    let descricao_tentativa = ipt_descricao.value;

    if (descricao_tentativa.trim() == '') {
        mensagem_erro.innerHTML = '⚠️ Por favor, preencha o campo da descrição!'
        return false;
    }

    if (resultado_escolhido == "") {
        mensagem_erro.innerHTML = '⚠️ Por favor, selecione um resultado (Acerto/Erro) antes de registrar!';
        return false;
    }

    fetch("/tentativas/cadastrar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },

        body: JSON.stringify({

        descricao: descricao_tentativa,
        resultado: resultado_escolhido,
        id_usuario: sessionStorage.ID_USUARIO
        
    }),

    }).then(resposta => {
        if (resposta.ok) {
            alert("Tentativa registrada com sucesso!");
            window.location = "dashboard.html";
        }
    });
}
</script>
