<script>
b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
let proximaAtualizacao;

function obter_dados_dashboard() {
        var id_usuario = sessionStorage.ID_USUARIO;

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        fetch(`/tentativas/alimentar_dashboard/${id_usuario}`, { 
            method: "GET",
            headers: {"Content-Type": "application/json"},
    })
        .then(function (response) {
            if (response.ok) {
                response.json()
                .then(function (resposta) {
                    console.log(`Dados recebidos da VIEW: ${JSON.stringify(resposta)}`);
                    // resposta.reverse();
                    plotar_grafico_donut(resposta, id_usuario);
                    preencher_kpis(resposta);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
        .catch(function (error) {
            console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
        });
    };
///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

function obter_dados_grafico_evolucao() {
        var id_usuario = sessionStorage.ID_USUARIO;

        fetch(`/tentativas/alimentar_dashboard_evolucao/${id_usuario}`, { 
            method: "GET",
            headers: {"Content-Type": "application/json"},
    })
        .then(function (response) {
            if (response.ok) {
                response.json()
                .then(function (resposta) {
                    console.log(`Quantidade de dados recebidos: ${resposta.length}`);
                    console.table(resposta);
                    // resposta.reverse();
                    plotar_grafico_linha(resposta, id_usuario);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
        .catch(function (error) {
            console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
        });
    };
//////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

function plotar_grafico_linha(resposta, id_usuario) {
        console.log("Dados do gráfico de linha:", resposta);

        console.log('iniciando plotagem do gráfico de linha...');

        // Criando estrutura para plotar gráfico_linha - dados
        let dados_linha = {
            labels: [],
            datasets: [
            {
                label: 'Evolução de Arremessos',
                data: [],
                fill: false,
                borderColor: 'rgb(199, 52, 52)',
                tension: 0.4
            }]
        };


let totalAcertos = 0;
let numeroTentativa = 1;

for (let i = resposta.length - 1; i >= 0; i--) {

    dados_linha.labels.push(`Tentativa ${numeroTentativa}`);

    if (resposta[i].resultado === "Acertou") {
        totalAcertos++;
    }

    dados_linha.datasets[0].data.push(totalAcertos);

    numeroTentativa++;
}

    const config_linha = {
    type: "line",
    data: dados_linha,
    options: {
    scales: {
        y: {
        beginAtZero: true,
        grid: { color: "#333" },
        ticks: { color: "#fff" },
        },
        x: { grid: { display: false }, ticks: { color: "#fff" } },
    },
    plugins: { legend: { display: false } },
    },
};

        const linha = document.getElementById(`grafico_linha`);
        let myChart_linha = new Chart(linha, config_linha);
    }
///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
function plotar_grafico_donut(resposta, id_usuario) {
        let dashboard = resposta[0];

    let dados_donut = {
        labels: ["Acertos", "Erros"],
        datasets: [
        {
            data: [dashboard.total_acertos, dashboard.total_erros],
            backgroundColor: ["#22c55e", "#ef4444"], 
            borderColor: "#161616",
            borderWidth: 3,
        },
    ],
};
        const config_donut = {
            type: 'doughnut',
            data: dados_donut,
            options: {
        cutout: "70%",
        plugins: {
            legend: {
                position: "bottom",
            labels: { color: "#fff", padding: 20 },
            },
        },
    },
};

        const donut = document.getElementById(`grafico_donut`);
        let myChart_donut = new Chart(donut, config_donut);
        // setTimeout(() => atualizarGrafico(id_usuario, dados, myChart), 2000);
    }

    function preencher_kpis(resposta) {
        document.getElementById("kpi_porcentagem").innerHTML =
            `${resposta[0].fg_porcentagem}%`;

            document.getElementById("kpi_totais").innerHTML =
            `${resposta[0].total_arremessos}`;

            document.getElementById("kpi_total_acertos").innerHTML =
            `${resposta[0].total_acertos} 🔥`;
    }


    window.onload = function () {
    obter_dados_dashboard();
    obter_dados_grafico_evolucao(); 
};
</script>
